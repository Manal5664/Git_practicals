<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Front Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffcc00;
        }

        .hero {
            background: #007BFF;
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .box {
            background: white;
            margin: 10px;
            padding: 20px;
            display: inline-block;
            width: 250px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my simple front page</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome!</h2>
    <p>This is a simple and clean front page design.</p>
</section>

<div class="container">
    <div class="box">
        <h3>Feature 1</h3>
        <p>Some description here.</p>
    </div>

    <div class="box">
        <h3>Feature 2</h3>
        <p>Some description here.</p>
    </div>

    <div class="box">
        <h3>Feature 3</h3>
        <p>Some description here.</p>
    </div>
</div>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

</body>
</html>
